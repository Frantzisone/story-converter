 name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.19.0
      - name: Build
        run: |
          flutter create --org com.example temp_app
          cp pubspec.yaml temp_app/pubspec.yaml
          cp lib/main.dart temp_app/lib/main.dart
          cp android/app/src/main/AndroidManifest.xml temp_app/android/app/src/main/AndroidManifest.xml
          cd temp_app
          flutter pub get
          flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: story-converter
          path: temp_app/build/app/outputs/flutter-apk/app-release.apk
